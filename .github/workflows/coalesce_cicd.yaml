name: Deploy to Environment

on:
  push:
    branches:
      - cli_github_actions
  workflow_dispatch:

env:
  COA_VERSION: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Write Coalesce config
        run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - name: Write Snowflake private key
        run: |
          umask 077
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > rsa_key.p8

      - name: Install Coalesce CLI
        run: npm install -g @coalescesoftware/coa@${{ env.COA_VERSION }}

      - name: Create deployment plan
        run: coa plan --config COA_CONFIG --out ./coa-plan --debug

      - name: Deploy plan
        run: coa deploy --config COA_CONFIG --plan ./coa-plan --debug
