name: Deploy to Environment

on:
  push:
    branches:
      - main
      - cli_github_actions
  workflow_dispatch:

env:
  COA_VERSION: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Write Coalesce config
        run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - name: Install Coalesce CLI
        run: npm install -g @coalescesoftware/coa@${{ env.COA_VERSION }}

      - name: Show CLI version
        run: coa --version

      - name: Create deployment plan
        run: coa plan --config COA_CONFIG --out ./coa-plan --debug

      - name: Deploy plan
        run: coa deploy --config COA_CONFIG --plan ./coa-plan --debug
